<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Manager</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- ================= MAIN CONTAINER ================= -->
<div class="container-fluid py-4 px-3 px-md-5">
    <div class="mx-auto" style="max-width:1100px;">

        <!-- HEADER -->
        <div class="card text-white mb-4 border-0 shadow-sm box-color">
            <div class="card-body d-flex justify-content-between align-items-center py-4 px-4">
                <h2 class="mb-0 fw-semibold">📦 Gestión de Inventario</h2>
                <button id="darkToggle" class="dark-toggle-btn">
                    <i class="bi bi-moon-fill"></i>
                </button>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div class="row mb-4 g-3">

            <div class="col-12 col-md-4">
                <div class="card border-2 shadow-sm dashboard-card">
                    <div class="card-body d-flex justify-content-between align-items-center py-3">
                        <div>
                            <small class="text-muted">Productos</small>
                            <h5 class="mb-0 fw-bold" id="totalProducts">0</h5>
                        </div>
                        <div class="dashboard-icon bg-dark text-white">
                            <i class="bi bi-box"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card border-2 shadow-sm dashboard-card">
                    <div class="card-body d-flex justify-content-between align-items-center py-3">
                        <div>
                            <small class="text-muted">Stock Total</small>
                            <h5 class="mb-0 fw-bold" id="totalStock">0</h5>
                        </div>
                        <div class="dashboard-icon bg-secondary text-white">
                            <i class="bi bi-layers"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card border-2 shadow-sm dashboard-card">
                    <div class="card-body d-flex justify-content-between align-items-center py-3">
                        <div>
                            <small class="text-muted">Valor Total</small>
                            <h5 class="mb-0 fw-bold" id="totalValue">$0</h5>
                        </div>
                        <div class="dashboard-icon bg-success text-white">
                            <i class="bi bi-currency-dollar"></i>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- TOP BAR -->
        <div class="row mb-4">
            <div class="col-md-8">
                <div class="topbar-container">

                    <div class="search-container">
                        <span class="search-icon">
                            <i class="bi bi-search"></i>
                        </span>
                        <input id="search"
                               class="form-control search-input"
                               placeholder="Buscar producto...">
                    </div>

                    <button class="btn create-btn"
                            data-bs-toggle="modal"
                            data-bs-target="#createModal">
                        <i class="bi bi-plus-circle me-1"></i>
                        <span class="d-none d-sm-inline">Nuevo</span>
                    </button>

                </div>
            </div>
        </div>

        <!-- TABLE -->
        <div class="card border-0">
            <div class="card-body">

                <div class="table-wrapper">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                            </thead>
                            <tbody id="productTable"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Pagination -->
                <ul id="pagination"
                    class="pagination justify-content-center mt-3">
                </ul>

            </div>
        </div>

    </div> <!-- mx-auto -->
</div> <!-- container-fluid -->


<!-- ================= MODALS ================= -->

<!-- EDIT MODAL -->
<div class="modal fade" id="editModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Editar Producto</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <input id="editName" class="form-control mb-2" placeholder="Nombre">
                <input id="editPrice" type="number" class="form-control mb-2" placeholder="Precio">
                <input id="editStock" type="number" class="form-control" placeholder="Stock">
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button id="confirmEdit" class="btn btn-success">Actualizar</button>
            </div>

        </div>
    </div>
</div>

<!-- CREATE MODAL -->
<div class="modal fade" id="createModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow">

            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">
                    <i class="bi bi-box-seam me-2"></i>
                    Crear Producto
                </h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form id="productForm">

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input id="name" class="form-control" placeholder="Ej: Laptop">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Precio</label>
                        <input id="price" type="number" class="form-control" placeholder="Ej: 1500">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Stock</label>
                        <input id="stock" type="number" class="form-control" placeholder="Ej: 10">
                    </div>

                </form>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" id="createBtn" class="btn btn-success">
                    <i class="bi bi-check-circle me-1"></i>
                    Crear
                </button>
            </div>

        </div>
    </div>
</div>

<!-- DELETE MODAL -->
<div class="modal fade" id="deleteModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Eliminar Producto</h5>
            </div>

            <div class="modal-body">
                ¿Seguro que deseas eliminar?
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button id="confirmDelete" class="btn btn-danger">Eliminar</button>
            </div>

        </div>
    </div>
</div>

<!-- ================= TOAST ================= -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="appToast" class="toast text-white">
        <div class="toast-header">
            <strong>Sistema</strong>
            <button class="btn-close" data-bs-dismiss="toast"></button>
        </div>
        <div id="toastBody" class="toast-body"></div>
    </div>
</div>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>

</body>
</html>
