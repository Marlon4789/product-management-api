<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row mb-4">
        <div class="col text-center">
            <h1 class="fw-bold">Gestión de Productos ☕</h1>
            <p class="text-muted">CRUD con Spring Boot + Bootstrap 5</p>
        </div>
    </div>


    <!-- FORM CARD -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <h5 class="card-title mb-3">Crear / Actualizar Producto</h5>

            <form id="productForm" class="row g-3">

                <div class="col-md-4">
                    <input id="name" class="form-control" placeholder="Nombre" required>
                </div>

                <div class="col-md-3">
                    <input id="price" type="number" step="0.01" class="form-control" placeholder="Precio" required>
                </div>

                <div class="col-md-3">
                    <input id="stock" type="number" class="form-control" placeholder="Stock" required>
                </div>

                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-dark" id="submitBtn">
                        Guardar
                    </button>
                </div>

            </form>
        </div>
    </div>

    <!-- TABLE CARD -->
    <div class="card shadow-sm">
        <div class="card-body">

            <h5 class="card-title mb-3">Lista de Productos</h5>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="productTable"></tbody>
                </table>
            </div>

        </div>
    </div>

</div>

<!-- MODAL EDITAR -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Editar Producto</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="editId">

                <div class="mb-3">
                    <label>Nombre</label>
                    <input id="editName" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Precio</label>
                    <input id="editPrice" type="number" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Stock</label>
                    <input id="editStock" type="number" class="form-control">
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancelar
                </button>

                <button class="btn btn-primary"
                        id="updateProductBtn">
                    Actualizar
                </button>
            </div>

        </div>
    </div>
</div>

<!-- MODAL DELETE -->
<div class="modal fade" id="deleteModal">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content text-center p-3">

            <h5>¿Eliminar producto?</h5>

            <input type="hidden" id="deleteId">

            <div class="mt-3">
                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancelar
                </button>

                <button class="btn btn-danger"
                        id="confirmDeleteBtn">
                    Eliminar
                </button>
            </div>

        </div>
    </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">

    <div id="appToast"
         class="toast align-items-center text-bg-success border-0"
         role="alert"
         aria-live="assertive"
         aria-atomic="true">

        <div class="d-flex">
            <div class="toast-body" id="toastMessage">
                Mensaje
            </div>

            <button type="button"
                    class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast">
            </button>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script type="module" src="/js/app.js"></script>

</body>
</html>
